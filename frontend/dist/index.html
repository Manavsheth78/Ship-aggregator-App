<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1B5E20" />
    <title>ShipHub — Smart Shipment Monitoring</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f9fafb;
      }

      #app-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #f9fafb;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }

      #app-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .loader-logo {
        width: 56px;
        height: 56px;
        background: #1B5E20;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 20px;
      }

      .loader-logo svg {
        width: 28px;
        height: 28px;
        fill: none;
        stroke: white;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .loader-title {
        font-size: 22px;
        font-weight: 700;
        color: #111827;
        margin-bottom: 6px;
        letter-spacing: -0.3px;
      }

      .loader-subtitle {
        font-size: 13px;
        color: #9ca3af;
        margin-bottom: 32px;
      }

      .loader-spinner {
        width: 36px;
        height: 36px;
        border: 3px solid #e5e7eb;
        border-top-color: #1B5E20;
        border-radius: 50%;
        animation: spin 0.75s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
    <script type="module" crossorigin src="/assets/index-BZcjPFbG.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-rQ2NPB2P.css">
  </head>
  <body>
    <!-- Splash screen — visible instantly, removed when React mounts -->
    <div id="app-loader">
      <div class="loader-logo">
        <!-- Package icon -->
        <svg viewBox="0 0 24 24">
          <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/>
          <path d="m3.3 7 8.7 5 8.7-5"/>
          <path d="M12 22V12"/>
        </svg>
      </div>
      <div class="loader-title">ShipHub</div>
      <div class="loader-subtitle">Smart Shipment Monitoring</div>
      <div class="loader-spinner"></div>
    </div>

    <div id="root"></div>

    <script>
      // Remove loader once React has mounted
      window.__hideLoader = function() {
        var loader = document.getElementById('app-loader');
        if (loader) {
          loader.classList.add('hidden');
          setTimeout(function() { loader.remove(); }, 350);
        }
      };
    </script>
  </body>
</html>
